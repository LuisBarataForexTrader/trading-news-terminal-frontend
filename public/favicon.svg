<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#0a0c0f"/>
  <rect x="5" y="5" width="22" height="22" fill="none" stroke="#00d4ff" stroke-width="2.5"/>
  <rect x="11" y="11" width="10" height="10" fill="#00d4ff" transform-origin="16 16">
    <animate attributeName="opacity"
             values="1;0.4;1"
             dur="2s"
             repeatCount="indefinite"/>
    <animateTransform attributeName="transform"
                      type="scale"
                      values="1;0.7;1"
                      dur="2s"
                      repeatCount="indefinite"/>
  </rect>
</svg>
