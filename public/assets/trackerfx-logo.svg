<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48">
  <defs>
    <linearGradient id="tfxg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9B6FE0"/>
      <stop offset="100%" stop-color="#5B8FE8"/>
    </linearGradient>
  </defs>
  <!-- Infinity loop icon — 4-petal clover shape -->
  <g transform="translate(4,4)">
    <!-- Top loop -->
    <ellipse cx="20" cy="12" rx="10" ry="9" fill="none" stroke="url(#tfxg)" stroke-width="5" stroke-linecap="round"/>
    <!-- Bottom loop -->
    <ellipse cx="20" cy="28" rx="10" ry="9" fill="none" stroke="url(#tfxg)" stroke-width="5" stroke-linecap="round"/>
    <!-- Left loop -->
    <ellipse cx="12" cy="20" rx="9" ry="10" fill="none" stroke="url(#tfxg)" stroke-width="5" stroke-linecap="round"/>
    <!-- Right loop -->
    <ellipse cx="28" cy="20" rx="9" ry="10" fill="none" stroke="url(#tfxg)" stroke-width="5" stroke-linecap="round"/>
  </g>
  <!-- TRACKER FX text -->
  <text x="50" y="30" font-size="14" font-weight="400" letter-spacing="2"
        font-family="'Inter','Helvetica Neue','Arial',sans-serif"
        fill="#1a1a2e">TRACKER FX</text>
</svg>
